# GetAJob — CI Pipeline
#
# Runs on push to main and on all pull requests.
# Jobs run in parallel where possible for fast feedback.
# Uses uv for fast dependency installation and caching.
#
# Jobs:
#   lint       — ruff check + ruff format check (5 min)
#   typecheck  — mypy strict mode (10 min)
#   test       — pytest with SQLite, coverage (15 min)
#   security   — secrets scan, bandit, pip-audit (10 min)
#
# ── Auto-merge prerequisites ──────────────────────────────────────────────
# To enable auto-merge for Dependabot PRs in the GitHub UI:
#   1. Go to Settings → Branches → Add branch protection rule for `main`.
#   2. Enable "Require a pull request before merging".
#   3. Enable "Require approvals" (1 is sufficient for Dependabot).
#   4. Enable "Require status checks to pass before merging".
#   5. Add required checks (select from the job names below):
#      - "Lint (ruff)"
#      - "Type Check (mypy)"
#      - "Tests (pytest)"
#      - "Security Scan"
#      - "CodeQL Analysis"
#   6. Enable "Require branches to be up-to-date before merging".
#   7. Optionally enable "Allow auto-merge" for convenience.
#
# With these settings, Dependabot PRs that pass CI will merge automatically
# (or await approval if a review is also required).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  PYTHONUNBUFFERED: "1"
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-local-path: ${{ env.UV_CACHE_DIR }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Cache ruff analysis
        uses: actions/cache@v6
        with:
          path: .ruff_cache
          key: ruff-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: ruff-

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-local-path: ${{ env.UV_CACHE_DIR }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Cache mypy
        uses: actions/cache@v6
        with:
          path: .mypy_cache
          key: mypy-${{ hashFiles('pyproject.toml', 'uv.lock', '**/*.py') }}
          restore-keys: mypy-

      - name: Run mypy
        run: uv run mypy .

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint]
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-local-path: ${{ env.UV_CACHE_DIR }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          output: sarif-results
          upload: never

      - name: Upload CodeQL SARIF
        uses: actions/upload-artifact@v7
        with:
          name: codeql-results
          path: sarif-results
          retention-days: 7

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-local-path: ${{ env.UV_CACHE_DIR }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        env:
          GETAJOB_LLM__PROVIDER: mock
          GETAJOB_SECURITY__ENCRYPTION_KEY: test-key-not-for-prod-32bytes!
          GETAJOB_SECURITY__ENCRYPTION_SALT: deadbeefdeadbeefdeadbeefdeadbeef
        run: uv run pytest tests/ --cov --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-local-path: ${{ env.UV_CACHE_DIR }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@v3.95.8
        with:
          extra_args: --only-verified
        continue-on-error: true

      - name: Run bandit security linter
        continue-on-error: true
        run: |
          uv pip install bandit 2>/dev/null
          bandit -c pyproject.toml -r core/ agents/ browser_engine/ profile_engine/ tailoring_engine/ outreach_engine/ approval_queue/ getajob/ -f json -o bandit-report.json || true

      - name: Run pip-audit dependency scan
        continue-on-error: true
        run: |
          uv pip install pip-audit 2>/dev/null
          uv run pip-audit --strict --progress-spinner=off 2>&1 || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-reports
          path: |
            bandit-report.json
          retention-days: 30

      - name: Check for .env in working tree
        run: |
          if git ls-files --cached | grep -q '\.env$'; then
            echo "❌ ERROR: .env file is tracked by git!"
            git ls-files --cached | grep '\.env$'
            exit 1
          fi
          echo "✅ No .env files tracked in git"

      - name: Verify no secrets in config YAML
        run: |
          ! grep -rE '(sk-ant|api_key|api-key|password|secret).{8,}' config/*.yaml 2>/dev/null | grep -v '^[[:space:]]*#' || {
            echo "❌ Possible secret in config YAML!"; exit 1;
          }
          echo "✅ No obvious secrets in config files"
